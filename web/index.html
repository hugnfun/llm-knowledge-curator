<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Knowledge Curator</title>
<link rel="stylesheet" href="/static/css/app.css?v=6">
</head>
<body>
<div id="app">
  <nav class="nav-bar">
    <div class="nav-brand">
      <span class="logo">LLKC</span>
      <span class="brand-sub">Content Factory</span>
    </div>
    <div class="nav-tabs">
      <button class="tab active" data-view="materials">Material Pool</button>
      <button class="tab" data-view="pipeline">Pipeline</button>
      <button class="tab" data-view="thinking">Daily Thinking</button>
      <button class="tab" data-view="drafts">Drafts</button>
    </div>
    <div class="nav-stats" id="nav-stats"></div>
    <button id="btn-ingest-url" class="btn btn-primary" style="margin-left:auto;">+ Ingest URL</button>
  </nav>

  <main id="content">
    <!-- Material Pool View -->
    <section id="view-materials" class="view active">
      <div class="view-header">
        <h2>Material Pool</h2>
        <div class="filters">
          <select id="filter-source" class="filter-select">
            <option value="">All Sources</option>
            <option value="clippings">Clippings</option>
            <option value="telegram">Telegram</option>
            <option value="x-bookmarks">X-Bookmarks</option>
            <option value="wechat">微信公众号</option>
            <option value="douyin">抖音</option>
            <option value="xhs">小红书</option>
            <option value="generic">Web</option>
          </select>
          <input type="text" id="filter-search" class="filter-input" placeholder="Search...">
        </div>
      </div>
      <div class="kanban-board" id="materials-board"></div>
    </section>

    <!-- Pipeline View -->
    <section id="view-pipeline" class="view">
      <div class="view-header">
        <h2>Pipeline</h2>
        <div class="pipeline-actions">
          <button class="btn btn-primary" id="btn-run-incremental">Run Incremental</button>
          <button class="btn" id="btn-run-classify">Classify Pending</button>
          <button class="btn" id="btn-run-pool">Pool Items</button>
        </div>
      </div>
      <div class="pipeline-board" id="pipeline-board"></div>
    </section>

    <!-- Daily Thinking View -->
    <section id="view-thinking" class="view">
      <div class="view-header">
        <h2>Daily Thinking</h2>
        <div class="thinking-controls">
          <input type="date" id="thinking-date" class="filter-input">
          <button class="btn btn-primary" id="btn-generate-thinking">Generate</button>
        </div>
      </div>
      <div class="thinking-layout">
        <div class="thinking-seeds" id="thinking-seeds"></div>
        <div class="thinking-editor">
          <textarea id="free-write" placeholder="Write your thoughts here..." rows="20"></textarea>
          <button class="btn btn-primary" id="btn-save-freewrite">Save Free Write</button>
        </div>
      </div>
    </section>

    <!-- Drafts View -->
    <section id="view-drafts" class="view">
      <div class="view-header">
        <h2>Drafts</h2>
        <div class="draft-actions">
          <input type="date" id="draft-date" class="filter-input">
          <button class="btn btn-primary" id="btn-generate-drafts">Generate Drafts</button>
        </div>
      </div>
      <div class="drafts-list" id="drafts-list"></div>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <div id="item-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <button class="modal-close" onclick="closeItemModal()">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>
  <div id="ingest-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content" style="width:560px;">
      <button class="modal-close" onclick="closeIngestModal()">&times;</button>
      <h2 style="font-size:16px;margin-bottom:12px;">Ingest URL</h2>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">
        粘贴微信公众号 / 抖音 / 小红书或任意文章链接，自动提取正文/转录写入 Obsidian inbox。
      </p>
      <input type="text" id="ingest-url-input" class="filter-input" style="width:100%;padding:8px;margin-bottom:12px;" placeholder="https://...">
      <div id="ingest-hint" style="font-size:12px;color:var(--text-muted);min-height:16px;margin-bottom:12px;"></div>
      <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);margin-bottom:12px;">
        <input type="checkbox" id="ingest-auto-classify">
        提取完成后自动跑判别器（会一次跑所有 pending items）
      </label>
      <div id="ingest-status" style="font-size:12px;color:var(--text-muted);min-height:20px;margin-bottom:12px;white-space:pre-wrap;"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button class="btn" onclick="closeIngestModal()">Cancel</button>
        <button id="btn-ingest-submit" class="btn btn-primary">Ingest</button>
      </div>
    </div>
  </div>
</div>
<script src="/static/js/app.js?v=6"></script>
</body>
</html>
